name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          set -o pipefail
          echo "=== Removing old package-lock.json ==="
          rm -f package-lock.json
          echo "=== npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          if [ ! -d node_modules/expo ]; then
            echo "ERROR: expo module not found!"
            exit 1
          fi
          echo "=== Package versions ==="
          cat node_modules/expo/package.json | grep '"version"' | head -1
          cat node_modules/react-native/package.json | grep '"version"' | head -1

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done

      - name: Clean old android directory
        working-directory: mobile
        run: |
          echo "=== Removing old android directory to force fresh prebuild ==="
          rm -rf android
          echo "Android directory removed"

      - name: Expo Prebuild
        working-directory: mobile
        run: |
          set -o pipefail
          echo "=== Running expo prebuild (Expo SDK 53) ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          PREBUILD_EXIT=${PIPESTATUS[0]}
          echo "Expo prebuild exit code: $PREBUILD_EXIT"
          if [ $PREBUILD_EXIT -ne 0 ]; then
            echo "ERROR: expo prebuild failed with exit code $PREBUILD_EXIT!"
            echo "=== Last 80 lines of prebuild log ==="
            tail -80 prebuild.log
            exit 1
          fi
          if [ ! -d android ]; then
            echo "ERROR: android directory NOT created!"
            echo "=== Last 80 lines of prebuild log ==="
            tail -80 prebuild.log
            exit 1
          fi
          echo "=== Prebuild succeeded! ==="
          echo "=== Android directory contents ==="
          ls -la android/
          echo "=== Root build.gradle ==="
          cat android/build.gradle
          echo ""
          echo "=== App build.gradle ==="
          cat android/app/build.gradle

      - name: Enable JS bundling for Debug APK
        working-directory: mobile
        run: |
          echo "=== Modifying react {} block for Debug APK bundling ==="
          echo "=== Original react {} block ==="
          grep -A20 "^react {" android/app/build.gradle || echo "react {} block not found"
          
          echo ""
          echo "=== Adding debuggableVariants = [] ==="
          sed -i '/^react {/a\    debuggableVariants = []' android/app/build.gradle
          
          echo ""
          echo "=== Ensuring hermesEnabled=true in gradle.properties ==="
          sed -i '/hermesEnabled/d' android/gradle.properties
          echo "" >> android/gradle.properties
          echo "hermesEnabled=true" >> android/gradle.properties
          echo "=== gradle.properties last 5 lines ==="
          tail -5 android/gradle.properties
          
          echo ""
          echo "=== Modified react {} block ==="
          grep -A25 "^react {" android/app/build.gradle || echo "react {} block not found"

      - name: Fix Gradle version
        working-directory: mobile/android
        run: |
          echo "=== Current gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo ""
          echo "=== Checking if Gradle version needs update ==="
          CURRENT_GRADLE=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\([0-9.]*\).*/\1/')
          echo "Current Gradle version: $CURRENT_GRADLE"
          REQUIRED_GRADLE="8.10.2"
          if [ "$CURRENT_GRADLE" != "$REQUIRED_GRADLE" ]; then
            echo "Updating Gradle from $CURRENT_GRADLE to $REQUIRED_GRADLE"
            sed -i "s|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-${REQUIRED_GRADLE}-all.zip|g" gradle/wrapper/gradle-wrapper.properties
          else
            echo "Gradle version is already $REQUIRED_GRADLE, no update needed"
          fi
          echo ""
          echo "=== Updated gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission
        run: chmod +x mobile/android/gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Building Debug APK ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export GRADLE_OPTS="-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000"
          ./gradlew assembleDebug --no-daemon --stacktrace --no-build-cache 2>&1 | tee ../gradle-debug.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Debug exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "DEBUG BUILD FAILED!"
            echo ""
            echo "=== DIAGNOSTIC: Root build.gradle ==="
            cat build.gradle 2>/dev/null || echo "Cannot read root build.gradle"
            echo ""
            echo "=== DIAGNOSTIC: App build.gradle (first 100 lines) ==="
            head -100 app/build.gradle 2>/dev/null || echo "Cannot read app/build.gradle"
            echo ""
            echo "=== DIAGNOSTIC: settings.gradle ==="
            cat settings.gradle 2>/dev/null || echo "Cannot read settings.gradle"
            echo ""
            echo "=== DIAGNOSTIC: gradle-wrapper.properties ==="
            cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "Cannot read gradle-wrapper.properties"
            echo ""
            echo "=== DIAGNOSTIC: gradle.properties ==="
            cat gradle.properties 2>/dev/null || echo "Cannot read gradle.properties"
            echo ""
            echo "=== DIAGNOSTIC: Last 200 lines of gradle-debug.log ==="
            tail -200 ../gradle-debug.log 2>/dev/null || echo "Cannot read gradle-debug.log"
            exit 1
          fi

      - name: Build Release APK
        continue-on-error: true
        working-directory: mobile/android
        run: |
          echo "=== Building Release APK ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export GRADLE_OPTS="-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000"
          ./gradlew assembleRelease --no-daemon --stacktrace --no-build-cache 2>&1 | tee ../gradle-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Release exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "RELEASE BUILD FAILED!"
            exit 1
          fi

      - name: Check APK files
        run: |
          echo "=== APK Files ==="
          DEBUG_APK=$(find mobile/android/app/build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$DEBUG_APK" ]; then
            echo "ERROR: No APK file found!"
            echo "Available files in build directory:"
            ls -la mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"
            ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release dir not found"
            exit 1
          fi
          echo "Found APK: $DEBUG_APK"
          ls -lah mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"
          ls -lah mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release dir not found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/gradle-debug.log
            mobile/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn