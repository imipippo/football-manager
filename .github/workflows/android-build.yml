name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          if [ ! -d node_modules/expo ]; then
            echo "ERROR: expo module not found!"
            exit 1
          fi
          echo "=== Package versions ==="
          cat node_modules/expo/package.json | grep '"version"' | head -1
          cat node_modules/react-native/package.json | grep '"version"' | head -1
          cat node_modules/expo-modules-core/package.json | grep '"version"' | head -1

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done

      - name: Clean android directory
        run: |
          rm -rf mobile/android
          echo "Removed old android directory"

      - name: Expo Prebuild
        working-directory: mobile
        run: |
          echo "=== Running expo prebuild ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          if [ ! -d android ]; then
            echo "ERROR: android directory NOT created!"
            exit 1
          fi
          echo "=== Generated Gradle files ==="
          find android -name "*.gradle" -type f | head -10
          echo "=== MainActivity.kt content ==="
          cat android/app/src/main/java/com/footballmanager/app/MainActivity.kt 2>/dev/null || echo "MainActivity.kt not found"
          echo "=== MainApplication.kt content ==="
          cat android/app/src/main/java/com/footballmanager/app/MainApplication.kt 2>/dev/null || echo "MainApplication.kt not found"
          echo "=== Kotlin version in root build.gradle ==="
          grep -n "kotlin" android/build.gradle 2>/dev/null || echo "no kotlin found"
          echo "=== Kotlin version in settings.gradle ==="
          grep -n "kotlin" android/settings.gradle 2>/dev/null || echo "no kotlin found"
          echo "=== TOML files ==="
          find android -name "*.toml" -type f 2>/dev/null | head -5
          echo "=== Checking expo-modules-core ==="
          if [ -d "node_modules/expo-modules-core/android" ]; then
            echo "expo-modules-core/android exists"
            ls -la node_modules/expo-modules-core/android/ | head -10
          else
            echo "ERROR: expo-modules-core/android NOT FOUND!"
          fi

      - name: Run Android build fix script
        run: python3 scripts/fix-android-build.py

      - name: Clean Gradle
        working-directory: mobile/android
        run: ./gradlew clean --no-daemon

      - name: Verify Kotlin version fix
        run: |
          echo "=== Verifying Kotlin version in ALL files ==="
          echo "--- root build.gradle ---"
          grep -n "kotlin" mobile/android/build.gradle 2>/dev/null || echo "no kotlin found"
          echo "--- settings.gradle ---"
          grep -n "kotlin" mobile/android/settings.gradle 2>/dev/null || echo "no kotlin found"
          echo "--- gradle.properties ---"
          grep -n "kotlin" mobile/android/gradle.properties 2>/dev/null || echo "no kotlin found"
          echo "--- TOML files ---"
          find mobile/android -name "*.toml" -exec grep -n "kotlin" {} \; 2>/dev/null || echo "no toml found"
          echo "--- app/build.gradle kotlinOptions ---"
          grep -n "freeCompilerArgs\|allWarningsAsErrors\|kotlinOptions" mobile/android/app/build.gradle 2>/dev/null || echo "no kotlinOptions found"
          echo "--- node_modules kotlinOptions check ---"
          grep -rn "kotlinOptions" mobile/node_modules/@react-native-async-storage/async-storage/android/build.gradle 2>/dev/null && echo "ERROR: kotlinOptions found in async-storage!" || echo "OK: no kotlinOptions in async-storage"
          echo "=== Verification complete ==="

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      # NOTE: Disabled Gradle cache to prevent restoring old android directory from cache
      # - name: Cache Gradle
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.gradle/caches
      #       ~/.gradle/wrapper
      #     key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      #     restore-keys: |
      #       ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x mobile/android/gradlew

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Building Debug APK ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export GRADLE_OPTS="-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000"
          ./gradlew assembleDebug --no-daemon --stacktrace --no-build-cache 2>&1 | tee ../gradle-debug.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Debug exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "DEBUG BUILD FAILED!"
            exit 1
          fi

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          echo "=== Building Release APK ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export GRADLE_OPTS="-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000"
          ./gradlew assembleRelease --no-daemon --stacktrace --no-build-cache 2>&1 | tee ../gradle-release.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Release exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "RELEASE BUILD FAILED!"
            exit 1
          fi

      - name: Check APK files
        run: |
          echo "=== APK Files ==="
          DEBUG_APK=$(find mobile/android/app/build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$DEBUG_APK" ]; then
            echo "ERROR: No APK file found!"
            echo "Available files in build directory:"
            ls -la mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"
            ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release dir not found"
            exit 1
          fi
          echo "Found APK: $DEBUG_APK"
          ls -lah mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"
          ls -lah mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release dir not found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/gradle-debug.log
            mobile/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
