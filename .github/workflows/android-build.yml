name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm ci ==="
          npm ci --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== npm ci finished ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle debug build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-build.log
          echo "=== Build exit code: $? ==="

      - name: Check and list APK files
        run: |
          echo "=== Checking for debug APK files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          if [ -d "mobile/android/app/build/outputs/apk/debug" ]; then
            ls -la mobile/android/app/build/outputs/apk/debug/
          fi

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-logs
          path: |
            mobile/npm-install.log
            mobile/android/gradle-build.log
          retention-days: 7

      - name: Upload Debug APK (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm ci for release ==="
          npm ci --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== npm ci finished ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Generate Signing Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Build Release APK (Signed)
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle release build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log
          echo "=== Build exit code: $? ==="

      - name: Check and list APK files
        run: |
          echo "=== Checking for release APK files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          if [ -d "mobile/android/app/build/outputs/apk/release" ]; then
            ls -la mobile/android/app/build/outputs/apk/release/
          fi

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs
          path: |
            mobile/npm-install.log
            mobile/android/gradle-build.log
          retention-days: 7

      - name: Upload Release APK (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
