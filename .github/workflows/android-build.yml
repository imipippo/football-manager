name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== Verifying expo installation ==="
          npx expo --version || echo "expo not found"
          echo "=== npm install finished ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          echo "=== Creating missing assets ==="
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "Creating placeholder: assets/$file"
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done
          echo "=== Assets ready ==="
          ls -la assets/

      - name: Expo Prebuild - Generate Android Project
        working-directory: mobile
        run: |
          echo "=== Running expo prebuild to generate native Android project ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          echo "=== Prebuild finished ==="

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Create fix script
        run: |
          cat > /tmp/fix_build.py << 'ENDOFSCRIPT'
          import re
          
          # Fix 1: Remove hermesEnabled from wrong location in app/build.gradle
          app_build = "mobile/android/app/build.gradle"
          with open(app_build, 'r') as f:
              content = f.read()
          lines = content.split('\n')
          lines = [l for l in lines if not (l.strip().startswith('hermesEnabled') and '=' in l)]
          content = '\n'.join(lines)
          with open(app_build, 'w') as f:
              f.write(content)
          print("Fix 1: Removed hermesEnabled")
          
          # Fix 2: Upgrade AGP to 8.7.0 (required by androidx.core:1.16.0)
          # Check all possible locations where AGP version is defined
          
          files_to_check = [
              "mobile/android/settings.gradle",
              "mobile/android/build.gradle",
          ]
          
          # Also check for version catalog
          import os
          for root, dirs, files in os.walk("mobile/android"):
              for f in files:
                  if f.endswith('.toml'):
                      files_to_check.append(os.path.join(root, f))
          
          agp_upgraded = False
          
          for filepath in files_to_check:
              if not os.path.exists(filepath):
                  continue
              
              with open(filepath, 'r') as f:
                  content = f.read()
              
              original = content
              
              # Pattern 1: classpath('com.android.tools.build:gradle:VERSION')
              content = re.sub(
                  r"com\.android\.tools\.build:gradle:[0-9][0-9]*\.[0-9]+[\.0-9]*",
                  "com.android.tools.build:gradle:8.7.0",
                  content
              )
              
              # Pattern 2: id("com.android.application") version "VERSION"
              content = re.sub(
                  r'id\("com\.android\.application"\)\s+version\s+"[0-9][0-9]*\.[0-9]+"',
                  'id("com.android.application") version "8.7.0"',
                  content
              )
              
              # Pattern 3: agp = "VERSION" or androidGradlePlugin = "VERSION"
              content = re.sub(
                  r'(agp|androidGradlePlugin)\s*=\s*"[0-9][0-9]*\.[0-9]+"',
                  r'\1 = "8.7.0"',
                  content
              )
              
              # Pattern 4: version = { agp = "VERSION" }
              content = re.sub(
                  r'(version\s*=\s*\{[^}]*)(agp\s*=\s*)"[0-9][0-9]*\.[0-9]+"',
                  r'\1\2"8.7.0"',
                  content,
                  flags=re.DOTALL
              )
              
              if content != original:
                  with open(filepath, 'w') as f:
                      f.write(content)
                  print(f"Fix 2: Upgraded AGP in {filepath}")
                  agp_upgraded = True
          
          if not agp_upgraded:
              print("WARNING: Could not find AGP version to upgrade, trying fallback...")
              # Fallback: create/modify settings.gradle with pluginManagement
              settings_file = "mobile/android/settings.gradle"
              if os.path.exists(settings_file):
                  with open(settings_file, 'r') as f:
                      content = f.read()
                  
                  if 'pluginManagement' not in content:
                      # Prepend pluginManagement block
                      plugin_mgmt = """
          pluginManagement {
              plugins {
                  id("com.android.application") version "8.7.0" apply false
                  id("com.android.library") version "8.7.0" apply false
                  id("org.jetbrains.kotlin.android") version "1.9.22" apply false
              }
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          """
                      content = plugin_mgmt + '\n' + content
                      with open(settings_file, 'w') as f:
                          f.write(content)
                      print("Fix 2b: Added pluginManagement to settings.gradle")
          
          print("Fix script completed!")
          ENDOFSCRIPT
          echo "Fix script created"

      - name: Run fix script
        run: python3 /tmp/fix_build.py

      - name: Verify AGP upgrade
          run: |
          echo "=== Checking AGP version in all files ==="
          grep -rn "8\.[5-7]\." mobile/android/ --include="*.gradle*" --include="*.toml" --include="*.properties" 2>/dev/null || echo "No version refs found"
          echo ""
          echo "=== Checking for any remaining resolutionStrategy force ==="
          grep -rn "force.*core.*1\.13" mobile/android/ --include="*.gradle*" 2>/dev/null && echo "WARNING: Old force found!" || echo "Clean"
          echo ""
          echo "=== settings.gradle pluginManagement ==="
          head -15 mobile/android/settings.gradle 2>/dev/null || echo "No settings.gradle"

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle debug build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-debug.log
          echo "=== Debug build exit code: $? ==="

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle release build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-release.log
          echo "=== Release build exit code: $? ==="

      - name: Check and list all APK files
        run: |
          echo "=== Checking for ALL APK files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Debug APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
          echo ""
          echo "=== Release APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory not found"

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/android/gradle-debug.log
            mobile/android/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
