name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          if [ ! -d node_modules/expo ]; then
            echo "ERROR: expo module not found!"
            exit 1
          fi
          echo "=== Package versions ==="
          cat node_modules/expo/package.json | grep '"version"' | head -1
          cat node_modules/react-native/package.json | grep '"version"' | head -1

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done

      - name: Clean android directory
        run: |
          rm -rf mobile/android
          echo "Removed old android directory"

      - name: Expo Prebuild
        working-directory: mobile
        run: |
          echo "=== Running expo prebuild ==="
          npx expo prebuild --platform android 2>&1 | tee prebuild.log
          if [ ! -d android ]; then
            echo "ERROR: android directory NOT created!"
            exit 1
          fi
          echo "=== Generated Gradle files ==="
          find android -name "*.gradle" -type f | head -10

      - name: Run Android build fix script
        run: python3 scripts/fix-android-build.py

      - name: Clean Gradle
        working-directory: mobile/android
        run: ./gradlew clean --no-daemon

      - name: Verify Kotlin version fix
        run: |
          echo "=== Verifying Kotlin version ==="
          grep -n "kotlin" mobile/android/build.gradle 2>/dev/null || echo "no kotlin found"

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      # NOTE: Disabled Gradle cache to prevent restoring old android directory from cache
      # - name: Cache Gradle
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.gradle/caches
      #       ~/.gradle/wrapper
      #     key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      #     restore-keys: |
      #       ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x mobile/android/gradlew

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Building Debug APK ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export GRADLE_OPTS="-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-debug.log
          echo "Debug exit code: $?"

      - name: Check APK files
        run: |
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
