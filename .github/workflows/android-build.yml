name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm ci ==="
          npm ci --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== npm ci finished with exit code $? ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install specific NDK version
        run: |
          echo "y" | sdkmanager --install "ndk;25.2.9519653" || true
          sdkmanager --list_installed | grep ndk || echo "Using default NDK"

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle debug build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee gradle-build.log
          echo "=== Gradle debug build finished with exit code $? ==="

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-logs
          path: |
            mobile/npm-install.log
            mobile/android/gradle-build.log
          retention-days: 7

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm ci for release ==="
          npm ci --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== npm ci finished with exit code $? ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install specific NDK version
        run: |
          echo "y" | sdkmanager --install "ndk;25.2.9519653"
          sdkmanager --list_installed | grep ndk || echo "NDK check complete"

      - name: Generate Signing Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Build Release APK (Signed)
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle release build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee gradle-build.log
          echo "=== Gradle release build finished with exit code $? ==="

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs
          path: |
            mobile/npm-install.log
            mobile/android/gradle-build.log
          retention-days: 7

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
