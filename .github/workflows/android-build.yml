name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Step 1 - DELETE android directory
        working-directory: mobile
        run: |
          rm -rf android

      - name: Step 2 - Clean caches
        working-directory: mobile
        run: |
          rm -rf node_modules
          npm cache clean --force
          rm -rf ~/.gradle/caches/

      - name: Step 3a - npm install
        working-directory: mobile
        run: |
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          if [ ! -d node_modules/expo ]; then
            echo "ERROR: expo module not found!"
            exit 1
          fi
          echo "=== Package versions ==="
          cat node_modules/expo/package.json | grep '"version"' | head -1
          cat node_modules/react-native/package.json | grep '"version"' | head -1

      - name: Step 3b - npx expo install
        working-directory: mobile
        run: |
          npx expo install 2>&1 | tee expo-install.log || echo "expo install completed"

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done

      - name: Step 4 - Expo Prebuild
        working-directory: mobile
        run: |
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          if [ ! -d android ]; then
            echo "ERROR: android directory NOT created!"
            exit 1
          fi
          echo "=== Generated Gradle files ==="
          find android -name "*.gradle" -type f | head -10

      - name: Step 5 - CRITICAL FIX: Force Kotlin 1.9.25 in ALL locations
        run: |
          echo "=== Step 5: Force Kotlin 1.9.25 ==="
          
          # Fix 1: gradle.properties
          echo "kotlinVersion=1.9.25" >> mobile/android/gradle.properties
          echo "hermesEnabled=true" >> mobile/android/gradle.properties
          echo "android.useAndroidX=true" >> mobile/android/gradle.properties
          echo "android.enableJetifier=true" >> mobile/android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> mobile/android/gradle.properties
          echo "org.gradle.daemon=false" >> mobile/android/gradle.properties
          echo "org.gradle.parallel=true" >> mobile/android/gradle.properties
          echo "org.gradle.caching=true" >> mobile/android/gradle.properties
          
          # Fix 2: root build.gradle - replace ext.kotlinVersion
          if [ -f mobile/android/build.gradle ]; then
            echo "--- Before fix (root build.gradle) ---"
            grep -n "kotlin" mobile/android/build.gradle | head -10 || echo "no kotlin found"
            sed -i 's/ext\.kotlinVersion[[:space:]]*=.*/ext.kotlinVersion = "1.9.25"/' mobile/android/build.gradle
            echo "--- After fix ---"
            grep -n "kotlin" mobile/android/build.gradle | head -10 || echo "no kotlin found"
          fi
          
          # Fix 3: settings.gradle - replace kotlin version in version catalog
          if [ -f mobile/android/settings.gradle ]; then
            echo "--- Before fix (settings.gradle) ---"
            grep -n "kotlin" mobile/android/settings.gradle | head -10 || echo "no kotlin found"
            sed -i 's/kotlin[[:space:]]*=[[:space:]]*"[^"]*"/kotlin = "1.9.25"/' mobile/android/settings.gradle
            echo "--- After fix ---"
            grep -n "kotlin" mobile/android/settings.gradle | head -10 || echo "no kotlin found"
          fi
          
          # Fix 4: libs.versions.toml if exists
          TOML_FILE=$(find mobile/android -name "libs.versions.toml" -type f 2>/dev/null | head -1)
          if [ -n "$TOML_FILE" ]; then
            echo "--- Before fix ($TOML_FILE) ---"
            grep -n "kotlin" "$TOML_FILE" | head -10 || echo "no kotlin found"
            sed -i 's/kotlin[[:space:]]*=[[:space:]]*"[^"]*"/kotlin = "1.9.25"/' "$TOML_FILE"
            echo "--- After fix ---"
            grep -n "kotlin" "$TOML_FILE" | head -10 || echo "no kotlin found"
          fi
          
          echo "=== Kotlin version fix complete ==="

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Grant execute permission
        run: chmod +x mobile/android/gradlew

      - name: Step 6 - Build APKs
        working-directory: mobile
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          GRADLE_OPTS: -Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
        run: |
          echo "=== Building Debug APK ==="
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-debug.log
          DEBUG_EXIT=$?
          echo "Debug exit code: $DEBUG_EXIT"
          
          echo ""
          echo "=== Building Release APK ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee ../gradle-release.log
          RELEASE_EXIT=$?
          echo "Release exit code: $RELEASE_EXIT"
          cd ..
          
          if [ $DEBUG_EXIT -ne 0 ] || [ $RELEASE_EXIT -ne 0 ]; then
            echo "BUILD FAILED - exiting with error"
            exit 1
          fi
          echo "SUCCESS: Both builds completed!"

      - name: List APK files
        if: always()
        run: |
          echo "=== APK Files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -lah mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug not found"
          ls -lah mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release not found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/expo-install.log
            mobile/prebuild.log
            mobile/gradle-debug.log
            mobile/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn