name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== Verifying expo installation ==="
          npx expo --version || echo "expo not found"
          echo "=== npm install finished ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          echo "=== Creating missing assets ==="
          mkdir -p assets
          
          # Create minimal valid PNG files (1x1 transparent pixel)
          # This is a base64-encoded 1x1 transparent PNG
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "Creating placeholder: assets/$file"
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done
          
          echo "=== Assets ready ==="
          ls -la assets/

      - name: Expo Prebuild - Generate Android Project
        working-directory: mobile
        run: |
          echo "=== Running expo prebuild to generate native Android project ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          echo "=== Prebuild finished ==="

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Fix dependencies - force compatible versions
        working-directory: mobile/android
        run: |
          echo "=== Forcing compatible dependency versions ==="
          
          # Strategy: Instead of upgrading AGP (which failed multiple times),
          # we'll downgrade androidx.core to version compatible with AGP 8.5.0
          
          # Create/update gradle.properties to force dependency versions
          cat > gradle.properties << 'PROPEOF'
          # Project-wide Gradle settings.
          
          # IDE (e.g. Android Studio) users:
          # Gradle settings configured through the IDE *will override*
          # any settings specified in this file.
          
          # For more details on how to configure your build environment visit
          # http://www.gradle.org/docs/current/userguide/build_environment.html
          
          # Specifies the JVM arguments used for the daemon process.
          # The setting is particularly useful for tweaking memory settings.
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          
          # When configured, Gradle will run in incubating parallel mode.
          # This option should only be used with decoupled projects. More details, visit
          # http://www.gradle.org/docs/current/userguide/multi_project_builds.html#sec:decoupled_projects
          # org.gradle.parallel=true
          
          # AndroidX package structure to make it clearer which packages are bundled with the
          # Android operating system, and which are packaged with your app's APK
          # https://developer.android.com/topic/libraries/support-library/androidx-rn
          android.useAndroidX=true
          
          # Kotlin code style for this project: "official" or "obsolete":
          kotlin.code.style=official
          
          # Enables namespacing of each library's R class so that its R class includes only the
          # resources declared in the library itself and none from the library's dependencies,
          # thereby reducing the size of the R class for that library
          android.nonTransitiveRClass=true
          
          # Force compatible versions for AGP 8.5.0
          androidx.core.version=1.13.1
          PROPEOF
          
          echo "=== Created gradle.properties with forced versions ==="
          cat gradle.properties
          
          # Also try to find and patch any version catalog files
          echo ""
          echo "=== Checking for version catalog files ==="
          find . -name "*.toml" -type f 2>/dev/null | while read f; do
            echo "--- Found: $f ---"
            cat "$f"
            # Replace core version in TOML files too
            sed -i 's/core = "1\.16\.0"/core = "1.13.1"/g' "$f"
            sed -i 's/coreKtx = "1\.16\.0"/coreKtx = "1.13.1"/g' "$f"
          done
          
          echo ""
          echo "=== Fixing hermesEnabled property location ==="
          # expo prebuild sometimes puts hermesEnabled inside dependencies block
          # It should be at project level or inside android block, not in dependencies
          if [ -f "app/build.gradle" ]; then
            # Remove hermesEnabled from dependencies block if it's there
            sed -i '/^[[:space:]]*hermesEnabled[[:space:]]*=/d' app/build.gradle
            
            # Add hermesEnabled as project ext property at the top of the file
            sed -i '1i\ext { hermesEnabled = true }' app/build.gradle
            
            echo "--- Fixed app/build.gradle ---"
            head -5 app/build.gradle
          fi
          
          echo ""
          echo "=== Final verification ==="
          grep -rn "1\.16\.0" . --include="*.toml" --include="*.properties" --include="*.gradle*" 2>/dev/null && echo "WARNING: Still has 1.16.0!" || echo "SUCCESS: All downgraded to 1.13.1"

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle debug build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-debug.log
          echo "=== Debug build exit code: $? ==="

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle release build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-release.log
          echo "=== Release build exit code: $? ==="

      - name: Check and list all APK files
        run: |
          echo "=== Checking for ALL APK files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Debug APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
          echo ""
          echo "=== Release APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory not found"

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/android/gradle-debug.log
            mobile/android/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
