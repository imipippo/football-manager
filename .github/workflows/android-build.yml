name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== Verifying expo installation ==="
          npx expo --version || echo "expo not found"
          echo "=== npm install finished ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          echo "=== Creating missing assets ==="
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "Creating placeholder: assets/$file"
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done
          echo "=== Assets ready ==="
          ls -la assets/

      - name: Expo Prebuild - Generate Android Project
        working-directory: mobile
        run: |
          echo "=== Running expo prebuild to generate native Android project ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          echo "=== Prebuild finished ==="

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Create fix script
        run: |
          cat > /tmp/fix_build.py << 'ENDOFSCRIPT'
          import re, sys
          
          build_file = "mobile/android/app/build.gradle"
          
          with open(build_file, 'r') as f:
              content = f.read()
          
          # 1. Remove hermesEnabled from wrong location
          lines = content.split('\n')
          lines = [l for l in lines if 'hermesEnabled' not in l.strip().split('=')[0].strip() if '=' in l or 'hermesEnabled' not in l]
          # Actually just remove any line that has hermesEnabled assignment
          lines = [l for l in lines if not (l.strip().startswith('hermesEnabled') and '=' in l)]
          content = '\n'.join(lines)
          
          # 2. Add resolutionStrategy before dependencies block
          resolution_strategy = """
          // Force compatible versions for AGP 8.5.0
          configurations.all {
              resolutionStrategy {
                  force 'androidx.core:core:1.13.1'
                  force 'androidx.core:core-ktx:1.13.1'
              }
          }
          """
          
          if 'resolutionStrategy' not in content and 'dependencies {' in content:
              content = content.replace('dependencies {', resolution_strategy + '\ndependencies {')
              print("Added resolutionStrategy")
          
          with open(build_file, 'w') as f:
              f.write(content)
          
          print("Fixed build.gradle successfully!")
          ENDOFSCRIPT
          echo "Fix script created"

      - name: Run fix script
        run: python3 /tmp/fix_build.py

      - name: Patch .toml files
        working-directory: mobile/android
        run: |
          find . -name "*.toml" -type f 2>/dev/null | while read f; do
            sed -i 's/core = "1\.16\.0"/core = "1.13.1"/g' "$f"
            sed -i 's/coreKtx = "1\.16\.0"/coreKtx = "1.13.1"/g' "$f"
          done
          echo "TOML files patched"

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle debug build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-debug.log
          echo "=== Debug build exit code: $? ==="

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle release build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-release.log
          echo "=== Release build exit code: $? ==="

      - name: Check and list all APK files
        run: |
          echo "=== Checking for ALL APK files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Debug APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
          echo ""
          echo "=== Release APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory not found"

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/android/gradle-debug.log
            mobile/android/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
