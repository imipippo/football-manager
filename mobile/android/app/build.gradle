apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

def projectRoot = rootProject.hasProperty("projectRoot") ? rootProject.projectRoot : ""
def expoAppExtension = projectRoot + "/app"
def generatedExponentPath = "../../../../../../node_modules/expo/android"
def exponentAppDir = file(projectRoot + "/../node_modules/expo/android").exists() ? expoAppExtension : ""
def exponentParamsFile = exponentAppDir ? file(exponentAppDir + "/app/expoview/values/strings/strings.xml") : null
def exponentParams = new XmlSlurper().parse(exponentParamsFile)
def versionCode = exponentParams.resources.string.find { it.@name == "expo.modules.updates.EXPO_UPDATE_CODE_VERSION_CODE" }.text()
def versionName = exponentParams.resources.string.find { it.@name == "expo.modules.updates.EXPO_UPDATE_VERSION_CODE" }.text()

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.footballmanager.app"
    defaultConfig {
        applicationId "com.footballmanager.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode versionCode != "" ? versionCode.toInteger() : 1
        versionName versionName != "" ? versionName : "1.0"
        buildConfigField("String", "EXPO_UPDATE_CODE_VERSION_CODE", "\"" + (versionCode != "" ? versionCode : "1") + "\"")
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging (findProperty('expo.useLegacyPackaging')?.toBoolean() ?: false)
        }
    }
    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += [
            '-Xjvm-default=all',
            '-Xno-optimized-callable-references',
            '-Xno-call-assertions',
            '-Xno-param-assertions',
            '-Xno-strict-conditional-prepare-analyzer',
            '-Xno-new-inference'
        ]
    }
    buildFeatures {
        buildConfig true
    }
}

def hermesEnabled = findProperty("hermesEnabled") == "true"
def jscFlavor = 'org.webkit:android-jsc:+'

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // Expo modules
    implementation project(':expo-modules-core')

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        implementation("com.facebook.fresco:animated-gif:${reactAndroidLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        implementation("com.facebook.fresco:webpsupport:${reactAndroidLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            implementation("com.facebook.fresco:animated-webp:${reactAndroidLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
apply from: new File(["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), "../native_modules.gradle");
applyNativeModulesAppBuildGradle(project)
