name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== Verifying expo installation ==="
          npx expo --version || echo "expo not found"
          echo "=== npm install finished ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          echo "=== Creating missing assets ==="
          mkdir -p assets
          
          # Create minimal valid PNG files (1x1 transparent pixel)
          # This is a base64-encoded 1x1 transparent PNG
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "Creating placeholder: assets/$file"
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done
          
          echo "=== Assets ready ==="
          ls -la assets/

      - name: Expo Prebuild - Generate Android Project
        working-directory: mobile
        run: |
          echo "=== Running expo prebuild to generate native Android project ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          echo "=== Prebuild finished ==="

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Fix AGP version and clean dependencies
        working-directory: mobile/android
        run: |
          echo "=== Fixing AGP version and cleaning dependencies ==="
          
          # Show current AGP version
          echo "=== Current AGP version ==="
          grep -n "com.android.tools.build:gradle" build.gradle || echo "NOT FOUND"
          
          # Upgrade AGP using multiple methods to ensure it works
          # Method 1: Direct sed replacement for common patterns
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.7.0/g' build.gradle
          
          # Method 2: Also try replacing the version number pattern
          sed -i 's/gradle:8\.[0-9]*/gradle:8.7.0/g' build.gradle
          
          # Method 3: Replace any remaining 8.x versions
          sed -i 's/gradle:8\.5\.0/gradle:8.7.0/g' build.gradle
          
          echo "=== Updated AGP version ==="
          grep -n "com.android.tools.build:gradle" build.gradle || echo "STILL NOT FOUND"
          
          # Clean app/build.gradle - remove our old manual additions
          if [ -f "app/build.gradle" ]; then
            sed -i "/implementation 'androidx.appcompat:appcompat:1.6.1'/d" app/build.gradle
            sed -i "/implementation 'androidx.core:core:1.12.0'/d" app/build.gradle
            echo "=== Cleaned old dependencies ==="
            grep -A 15 "^dependencies" app/build.gradle || echo "No dependencies found"
          fi

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle debug build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-debug.log
          echo "=== Debug build exit code: $? ==="

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle release build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-release.log
          echo "=== Release build exit code: $? ==="

      - name: Check and list all APK files
        run: |
          echo "=== Checking for ALL APK files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Debug APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
          echo ""
          echo "=== Release APK directory ==="
          ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory not found"

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/android/gradle-debug.log
            mobile/android/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
