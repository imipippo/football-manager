name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/expo-web-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/expo-web-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: |
          echo "=== Installing npm dependencies ==="
          npm ci --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== Installing additional web dependencies ==="
          npm install --legacy-peer-deps react-dom react-native-web @expo/metro-runtime 2>&1 | tee -a npm-install.log || true

      - name: Build Web with Metro bundler
        id: build
        working-directory: mobile
        run: |
          set -e
          echo "=============================================="
          echo "Building React Native Web with Metro"
          echo "==============================================
          
          export NODE_OPTIONS="--max-old-space-size=4096"
          export CI=true
          
          mkdir -p dist/web
          
          echo "--- Step 1: Try Metro bundler ---"
          npx metro build \
            platform=web \
            config=./metro.config.js \
            entry=index.js \
            out-file=dist/web/index.bundle \
            dev=false \
            minify=true \
            2>&1 | tee metro-build.log || {
            echo "--- Step 2: Try expo export ---"
            npx expo export --platform web --clear 2>&1 | tee -a metro-build.log || {
              echo "--- Step 3: Try expo build:web ---"
              npx expo build:web 2>&1 | tee -a metro-build.log || true
            }
          }
          
          echo "Build step completed"

      - name: Check build output and create fallback if needed
        run: |
          echo "=============================================="
          echo "Checking build outputs"
          echo "==============================================
          
          # Check for valid builds in various locations
          VALID_BUILD=false
          
          if [ -d "mobile/dist" ] && [ -f "mobile/dist/index.html" ]; then
            echo "✓ Found valid build in dist/"
            VALID_BUILD=true
          fi
          if [ "$VALID_BUILD" = false ] && [ -d "mobile/web-build" ] && [ -f "mobile/web-build/index.html" ]; then
            echo "✓ Found valid build in web-build/, copying to dist/"
            rm -rf mobile/dist
            mv mobile/web-build mobile/dist
            VALID_BUILD=true
          fi
          if [ "$VALID_BUILD" = false ]; then
            echo "--- No valid build found, creating landing page ---"
            mkdir -p mobile/dist
            
            python3 -c "
import os
html = '''<!DOCTYPE html>
<html lang=\"zh-CN\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <title>Football Manager</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{text-align:center;max-width:600px}
    .logo{font-size:4em;margin-bottom:20px}
    h1{font-size:2.5em;margin-bottom:10px;color:#2196F3}
    .subtitle{color:#888;font-size:1.1em;margin-bottom:30px}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:25px;margin:20px 0}
    .status{display:inline-block;padding:10px 20px;background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.3);border-radius:8px;color:#4CAF50;margin:15px 0}
    .links{margin-top:25px}
    .links a{display:inline-block;color:#2196F3;text-decoration:none;padding:12px 24px;border:1px solid #2196F3;border-radius:8px;margin:5px}
  </style>
</head>
<body>
  <div class=\"container\">
    <div class=\"logo\">⚽</div>
    <h1>Football Manager</h1>
    <p class=\"subtitle\">App Development in Progress</p>
    <div class=\"card\"><div class=\"status\">Building...</div><p style=\"color:#aaa;margin-top:15px\">Web version coming soon. Download APK for full experience.</p></div>
  </div>
</body>
</html>'''
os.makedirs('mobile/dist', exist_ok=True)
with open('mobile/dist/index.html', 'w') as f:
    f.write(html)
print('Created landing page')
"
            
            echo "Created landing page"
          fi
          # Copy SPA support files
          if [ -d "mobile/web" ]; then
            cp -r mobile/web/* mobile/dist/ 2>/dev/null || true
          fi
          
          echo "=== Final dist contents ==="
          ls -la mobile/dist/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mobile/dist
          publish_branch: gh-pages
          force_orphan: false

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-build-logs
          path: |
            mobile/npm-install.log
            mobile/metro-build.log
          retention-days: 7
