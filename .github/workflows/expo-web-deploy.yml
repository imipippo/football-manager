name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/expo-web-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/expo-web-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: |
          echo "=== Installing npm dependencies ==="
          npm ci --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== Installing additional web dependencies ==="
          npm install --legacy-peer-deps react-dom react-native-web @expo/metro-runtime 2>&1 | tee -a npm-install.log || true
          echo "=== Verifying key packages ==="
          npm ls react-native-web 2>&1 || echo "react-native-web not found"
          npm ls expo 2>&1 || echo "expo not found"

      - name: Build Web with Metro bundler
        id: build
        working-directory: mobile
        run: |
          set -e
          echo "=============================================="
          echo "Building React Native Web with Metro"
          echo "=============================================="
          
          export NODE_OPTIONS="--max-old-space-size=4096"
          export CI=true
          
          mkdir -p dist/web
          
          echo "--- Step 1: Bundle JavaScript ---"
          npx metro build \
            platform=web \
            config=./metro.config.js \
            entry=index.js \
            out-file=dist/web/index.bundle \
            dev=false \
            minify=true \
            2>&1 | tee metro-build.log || {
            echo "Metro direct build failed, trying alternative..."
            
            echo "--- Step 2: Try npx expo export ---"
            npx expo export --platform web --clear 2>&1 | tee -a metro-build.log || {
              echo "expo export also failed"
              
              echo "--- Step 3: Try webpack/expo build ---"
              npx expo build:web 2>&1 | tee -a metro-build.log || true
            }
          }
          
          echo "=============================================="
          echo "Build step completed, checking results"
          echo "==============================================

      - name: Check and fix build output
        run: |
          echo "=============================================="
          echo "Checking build outputs"
          echo "=============================================="
          
          echo "--- Contents of dist/ (if exists) ---"
          find mobile/dist -type f 2>/dev/null | head -30 || echo "No dist directory"
          
          echo "--- Contents of web-build/ (if exists) ---"
          find mobile/web-build -type f 2>/dev/null | head -30 || echo "No web-build directory"
          
          echo "--- Looking for index.html anywhere ---"
          find mobile -name "index.html" -type f 2>/dev/null | head -10 || echo "No index.html found"
          
          echo "--- Looking for .js bundles ---"
          find mobile/dist -name "*.js" -type f 2>/dev/null | head -10 || echo "No JS bundles in dist"
          find mobile/web-build -name "*.js" -type f 2>/dev/null | head-10 || echo "No JS bundles in web-build"
          
          if [ -d "mobile/dist" ] && [ -f "mobile/dist/index.html" ]; then
            echo "✓ Found valid build in dist/"
            exit 0
          fi
          
          if [ -d "mobile/web-build" ] && [ -f "mobile/web-build/index.html" ]; then
            echo "✓ Found valid build in web-build/, copying to dist/"
            rm -rf mobile/dist
            mv mobile/web-build mobile/dist
            exit 0
          fi
          
          echo "--- No valid build found, creating fallback ---"
          mkdir -p mobile/dist
          
          cat > mobile/dist/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>足球经理 - Football Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h1 { font-size: 2.5em; margin-bottom: 10px; background: linear-gradient(90deg, #2196F3, #00BCD4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #aaa; margin-bottom: 30px; line-height: 1.6; }
    .status { 
      padding: 15px 25px; 
      background: rgba(33, 150, 243, 0.15);
      border: 1px solid rgba(33, 150, 243, 0.3);
      border-radius: 10px;
      display: inline-block;
      color: #2196F3;
    }
    .links { margin-top: 30px; }
    .links a { 
      color: #2196F3; 
      text-decoration: none; 
      padding: 10px 20px;
      border: 1px solid #2196F3;
      border-radius: 5px;
      display: inline-block;
      margin: 5px;
    }
    .links a:hover { background: rgba(33, 150, 243, 0.1); }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ 足球经理</h1>
    <p>Football Manager App</p>
    <div class="status">📱 Web 构建中...</div>
    <div class="links">
      <a href="https://github.com/imipippo/football-manager/actions">查看构建状态</a>
      <a href="https://github.com/imipippo/football-manager">GitHub 仓库</a>
    </div>
  </div>
</body>
</html>
HTMLEOF
          
          echo "Created fallback index.html"
          ls -la mobile/dist/

      - name: Copy static web files (SPA routing support)
        run: |
          if [ -d "mobile/web" ]; then
            cp -r mobile/web/* mobile/dist/ 2>/dev/null || true
            echo "Copied SPA support files"
          fi

      - name: Final verification
        run: |
          echo "=== Final Verification ==="
          if [ -f "mobile/dist/index.html" ]; then
            echo "✓ index.html EXISTS!"
            wc -l mobile/dist/index.html
            exit 0
          else
            echo "✗ Still no index.html"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-build-logs
          path: |
            mobile/npm-install.log
            mobile/metro-build.log
          retention-days: 7

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
