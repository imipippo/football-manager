name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Step 1 - DELETE android directory
        working-directory: mobile
        run: |
          echo "=== Step 1: Delete corrupted android directory ==="
          rm -rf android
          echo "Done - android/ removed"

      - name: Step 2 - Clean caches (keep package-lock.json!)
        working-directory: mobile
        run: |
          echo "=== Step 2: Clean caches ==="
          rm -rf node_modules
          npm cache clean --force
          rm -rf ~/.gradle/caches/
          echo "=== Checking for package-lock.json ==="
          if [ -f package-lock.json ]; then
            echo "✓ package-lock.json exists"
            ls -lh package-lock.json
          else
            echo "✗ package-lock.json NOT found - will use npm install"
          fi
          echo "Done - Caches cleaned"

      - name: Step 3 - Install dependencies (use npm ci if lockfile exists)
        working-directory: mobile
        run: |
          echo "=== Step 3: Install dependencies ==="
          if [ -f package-lock.json ]; then
            echo "Using npm ci (exact versions from lockfile)"
            npm ci --legacy-peer-deps 2>&1 | tee npm-install.log
          else
            echo "Using npm install (no lockfile)"
            npm install --legacy-peer-deps --save-exact 2>&1 | tee npm-install.log
          fi
          echo "=== Verifying critical package versions ==="
          echo "Expo version:"
          cat node_modules/expo/package.json | grep '"version"' | head -1
          echo "React Native version:"
          cat node_modules/react-native/package.json | grep '"version"' | head -1
          echo "react-native-gesture-handler version:"
          cat node_modules/react-native-gesture-handler/package.json | grep '"version"' | head -1
          echo "Done - Dependencies installed"

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done

      - name: Step 4 - Expo Prebuild --clean
        id: prebuild
        working-directory: mobile
        run: |
          echo "=== Step 4: Expo prebuild --clean ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          PREBUILD_EXIT=$?
          echo "Prebuild exit code: $PREBUILD_EXIT"
          
          if [ $PREBUILD_EXIT -ne 0 ]; then
            echo "ERROR: Expo prebuild failed!"
            exit 1
          fi
          echo "=== Verifying android directory was created ==="
          if [ ! -d android ]; then
            echo "ERROR: android directory was NOT created by prebuild!"
            exit 1
          fi
          
          echo "✓ android directory exists"
          find android -name "*.gradle" -type f | head -10
          echo "Done - Prebuild finished successfully"

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Configure gradle.properties with Kotlin 1.9.25
        run: |
          echo "=== Checking if android directory exists ==="
          if [ ! -d mobile/android ]; then
            echo "ERROR: mobile/android directory does not exist!"
            exit 1
          fi
          
          echo "android.useAndroidX=true" > mobile/android/gradle.properties
          echo "android.enableJetifier=true" >> mobile/android/gradle.properties
          echo "hermesEnabled=true" >> mobile/android/gradle.properties
          echo "kotlin.version=1.9.25" >> mobile/android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> mobile/android/gradle.properties
          echo "org.gradle.daemon=false" >> mobile/android/gradle.properties
          echo "org.gradle.parallel=true" >> mobile/android/gradle.properties
          echo "org.gradle.caching=true" >> mobile/android/gradle.properties
          
          echo "Done - gradle.properties configured with Kotlin 1.9.25"
          cat mobile/android/gradle.properties

      - name: Grant execute permission
        run: |
          if [ ! -f mobile/android/gradlew ]; then
            echo "ERROR: gradlew not found!"
            exit 1
          fi
          chmod +x mobile/android/gradlew
          echo "✓ gradlew permission granted"

      - name: Step 5 - Build APKs
        working-directory: mobile
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          GRADLE_OPTS: -Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
        run: |
          echo "=== Building Debug APK ==="
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-debug.log
          DEBUG_EXIT=$?
          echo "Debug exit code: $DEBUG_EXIT"
          
          echo ""
          echo "=== Building Release APK ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee ../gradle-release.log
          RELEASE_EXIT=$?
          echo "Release exit code: $RELEASE_EXIT"
          cd ..
          
          if [ $DEBUG_EXIT -eq 0 ] && [ $RELEASE_EXIT -eq 0 ]; then
            echo "SUCCESS: Both builds completed!"
          else
            echo "WARNING: Some builds failed"
          fi

      - name: List APK files
        run: |
          echo "=== APK Files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -lah mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug not found"
          ls -lah mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release not found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/gradle-debug.log
            mobile/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn