name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      # ============================================================
      # 🧹 COMPLETE CLEAN REBUILD (Expo Official Method)
      # ============================================================
      
      - name: 🔥 Step 1 - DELETE android directory
        working-directory: mobile
        run: |
          echo "=== 🔥 Step 1: Delete corrupted android directory ==="
          rm -rf android
          echo "✓ android/ removed"

      - name: 🧹 Step 2 - Clean ALL caches
        working-directory: mobile
        run: |
          echo "=== 🧹 Step 2: Clean ALL caches ==="
          rm -rf node_modules
          rm -f package-lock.json yarn.lock 2>/dev/null || true
          npm cache clean --force
          # Clean Gradle user cache too
          rm -rf ~/.gradle/caches/
          echo "✓ All caches cleaned"

      - name: 📦 Step 3a - Base npm install (non-Expo deps)
        working-directory: mobile
        run: |
          echo "=== 📦 Step 3a: Install base dependencies ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log

      - name: 📦 Step 3b - npx expo install (CRITICAL for version compatibility!)
        working-directory: mobile
        run: |
          echo "=== 📦 Step 3b: npx expo install (fix RN version resolution) ==="
          echo "This ensures expo-modules-core gets correct react-native version"
          npx expo install 2>&1 | tee expo-install.log || echo "expo install completed (may have warnings)"
          
          echo ""
          echo "=== Verifying versions ==="
          npx expo --version
          cat node_modules/react-native/package.json | grep version | head -1
          cat node_modules/expo/package.json | grep version | head -1
          echo "✓ Dependencies installed with correct versions"

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done

      - name: 🔄 Step 4 - Expo Prebuild --clean
        working-directory: mobile
        run: |
          echo "=== 🔄 Step 4: Expo prebuild --clean ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          echo "✅ Prebuild finished"
          
          echo "=== Checking generated files ==="
          find android -name "*.gradle" -type f | head -10

      - name: Configure gradle.properties (safe config only)
        run: |
          cat > mobile/android/gradle.properties << 'EOF'
android.useAndroidX=true
android.enableJetifier=true
hermesEnabled=true
org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.caching=true
EOF
          echo "✓ gradle.properties configured"

      - name: Grant execute permission
        run: chmod +x mobile/android/gradlew

      - name: ⚡ Step 5 - Build APKs
        working-directory: mobile
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          GRADLE_OPTS: -Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
        run: |
          echo "=== ⚡ Building Debug APK ==="
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-debug.log
          DEBUG_EXIT=$?
          echo "Debug exit code: $DEBUG_EXIT"
          
          echo ""
          echo "=== ⚡ Building Release APK ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee ../gradle-release.log
          RELEASE_EXIT=$?
          echo "Release exit code: $RELEASE_EXIT"
          cd ..
          
          if [ $DEBUG_EXIT -eq 0 ] && [ $RELEASE_EXIT -eq 0 ]; then
            echo "✅ BOTH BUILDS SUCCESSFUL!"
          else
            echo "⚠ Some builds failed"
          fi

      - name: List APK files
        run: |
          echo "=== APK Files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -lah mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug not found"
          ls -lah mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release not found"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/expo-install.log
            mobile/prebuild.log
            mobile/gradle-debug.log
            mobile/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn