name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: |
          echo "=== Starting npm install ==="
          npm install --legacy-peer-deps 2>&1 | tee npm-install.log
          echo "=== Verifying expo installation ==="
          npx expo --version || echo "expo not found"
          echo "=== npm install finished ==="

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      # ============================================================
      # 🧹 COMPLETE CLEANUP & REBUILD (关键步骤)
      # ============================================================
      - name: 🔥 DELETE entire android directory (clean slate)
        run: |
          echo "=== 🔥 COMPLETE CLEANUP - Removing all Android files ==="
          rm -rf mobile/android
          echo "✓ mobile/android directory completely removed"
          ls mobile/ | grep -v android || echo "(no android dir - clean)"

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -v -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Generate missing asset files
        working-directory: mobile
        run: |
          echo "=== Creating missing assets ==="
          mkdir -p assets
          PNG_DATA="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
          for file in icon.png adaptive-icon.png splash.png favicon.png; do
            if [ ! -f "assets/$file" ]; then
              echo "Creating placeholder: assets/$file"
              echo "$PNG_DATA" | base64 -d > "assets/$file"
            fi
          done
          echo "=== Assets ready ==="
          ls -la assets/

      - name: Expo Prebuild --clean (FRESH GENERATION)
        working-directory: mobile
        run: |
          echo "=== 🔄 Running expo prebuild --clean (FRESH) ==="
          npx expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          echo "=== Prebuild finished ==="
          echo "=== Generated files ==="
          find android -name "*.gradle" -type f | head -20

      - name: Grant execute permission for Gradle
        run: chmod +x mobile/android/gradlew

      - name: Run Android build fix script
        run: python3 scripts/fix-android-build.py

      - name: Verify fix script output
        run: |
          echo "=== Checking build.gradle content ==="
          cat mobile/android/build.gradle
          echo ""
          echo "=== Checking app/build.gradle for RN plugin ==="
          grep -n "com.facebook.react" mobile/android/app/build.gradle && echo "❌ ERROR: RN plugin found!" || echo "✓ No RN plugin in app/build.gradle"
          echo ""
          echo "=== Checking root build.gradle for plugins DSL ==="
          grep -n "plugins {" mobile/android/build.gradle && echo "⚠ Warning: plugins block found" || echo "✓ No plugins DSL in root build.gradle"

      - name: Clean Gradle build cache (after fix)
        working-directory: mobile/android
        run: |
          echo "=== Cleaning Gradle build cache ==="
          ./gradlew clean --no-daemon 2>&1 | tail -5 || true
          ./gradlew cleanBuildCache --no-daemon 2>&1 | tail -5 || true
          rm -rf .gradle build app/build .cxx
          echo "✓ All caches cleaned"

      - name: Verify gradle.properties format
        run: |
          echo "=== gradle.properties content ==="
          cat mobile/android/gradle.properties
          echo ""
          echo "✓ Verification done"

      - name: Build Debug APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle debug build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export GRADLE_OPTS="-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-debug.log
          echo "=== Debug build exit code: $? ==="

      - name: Build Release APK
        working-directory: mobile/android
        run: |
          echo "=== Starting Gradle release build ==="
          export NODE_OPTIONS="--max-old-space-size=4096"
          export GRADLE_OPTS="-Xmx4608m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-release.log
          echo "=== Release build exit code: $? ==="

      - name: Check and list all APK files
        run: |
          echo "=== ALL APK files ==="
          find mobile/android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Debug APK ==="
          ls -lah mobile/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug not found"
          echo ""
          echo "=== Release APK ==="
          ls -lah mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release not found"

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            mobile/npm-install.log
            mobile/prebuild.log
            mobile/android/gradle-debug.log
            mobile/android/gradle-release.log
          retention-days: 7

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn